[workspace]
members = [
    "rs/conducer",
    "rs/hang",
    "rs/libmoq",
    "rs/moq-cli",
    "rs/moq-clock",
    "rs/moq-lite",
    "rs/moq-msf",
    "rs/moq-mux",
    "rs/moq-native",
    "rs/moq-relay",
    "rs/moq-token",
    "rs/moq-token-cli",
]
resolver = "2"

[workspace.dependencies]
conducer = { version = "0.3", path = "rs/conducer" }
hang = { version = "0.15", path = "rs/hang" }
moq-lite = { version = "0.15", path = "rs/moq-lite" }
moq-msf = { version = "0.1", path = "rs/moq-msf" }
moq-mux = { version = "0.3", path = "rs/moq-mux" }
moq-native = { version = "0.13", path = "rs/moq-native", default-features = false }
moq-token = { version = "0.5", path = "rs/moq-token" }

serde = { version = "1", features = ["derive"] }
tokio = "1.48"
web-async = { version = "0.1.3", features = ["tracing"] }
web-transport-iroh = { path = "../web-transport-iroh" }
web-transport-proto = { path = "../web-transport/web-transport-proto" }
web-transport-quiche = "0.2"
web-transport-quinn = { path = "../web-transport/web-transport-quinn" }
web-transport-trait = { path = "../web-transport/web-transport-trait" }
web-transport-ws = { path = "../web-transport/web-transport-ws" }

[patch.crates-io]
web-transport-proto = { path = "../web-transport/web-transport-proto" }
web-transport-trait = { path = "../web-transport/web-transport-trait" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"

[profile.profiling]
inherits = "release"
debug = "line-tables-only"
# frame pointers: pass RUSTFLAGS="-C force-frame-pointers=yes" when building
