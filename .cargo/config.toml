[build]
rustflags = ["--cfg", "tokio_unstable"]

[env]
# audiopus_sys 0.2.2 vendors a libopus source tree whose CMakeLists.txt asks
# for `cmake_minimum_required(VERSION 3.0)`, which CMake 4 rejects. Setting
# this env lets CMake fall back to the 3.5 policy version instead. Needed
# on every platform that builds moq-audio with the `opus` or `opus-static`
# feature — we deliberately vendor libopus rather than dynamic-linking it
# so libmoq/moq-ffi staticlibs are self-contained for downstream linkers
# (the Swift XCFramework relies on this).
CMAKE_POLICY_VERSION_MINIMUM = { value = "3.5", force = true }
