name: Update Flake

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch: # Allow manual triggering
  schedule:
    - cron: '0 12 1 * *' # Run monthly on the 1st at noon UTC

jobs:
  update-flake:
    name: Update flake.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@ec13d37c32ca75bc750ecc133e944e5a18164688 # main
        with:
          pr-title: "Update flake.lock"
          pr-labels: |
            dependencies
            automated
