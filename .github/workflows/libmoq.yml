name: libmoq

on:
  push:
    tags:
      - "libmoq-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_nix: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_nix: true
          # Both Apple targets build on the Apple Silicon runner: the
          # Determinate Nix installer dropped Intel macOS, so x86_64 is
          # cross-compiled (Apple clang is multi-arch). libmoq.a needs no
          # execution, so no Rosetta. See rs/libmoq/build.sh.
          - target: x86_64-apple-darwin
            os: macos-latest
            use_nix: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_nix: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_nix: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        if: matrix.use_nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      - name: Install Rust (Windows)
        if: '!matrix.use_nix'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version libmoq

      - name: Build and package
        shell: bash
        run: |
          ./rs/libmoq/build.sh \
            --target ${{ matrix.target }} \
            --version ${{ steps.parse.outputs.version }} \
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: libmoq-${{ matrix.target }}
          path: dist/*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version libmoq

      - name: Find previous tag
        id: prev_tag
        run: .github/scripts/release.sh prev-tag libmoq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: "libmoq v${{ steps.parse.outputs.version }}"
          RELEASE_PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: .github/scripts/release.sh create artifacts

  # The OBS plugin (cpp/obs) statically links libmoq, so it ships with every
  # libmoq release: rebuild it against the release we just published (no
  # second cargo build, guaranteed-matching ABI) and cut a parallel
  # obs-moq-v<version> release. Runs after `release` so the libmoq archives
  # the plugin's CMake fetches are already live.
  obs-build:
    name: OBS plugin (${{ matrix.target }})
    needs: release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_nix: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            use_nix: true
          - target: aarch64-apple-darwin
            os: macos-latest
            use_nix: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_nix: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        if: matrix.use_nix
        uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
        with:
          determinate: false

      # obs-deps ship libobs + Qt6 but not ffmpeg/pkg-config; Homebrew does.
      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install ffmpeg pkg-config

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version libmoq

      - name: Build and package (Linux, nix)
        if: matrix.use_nix
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          nix develop --accept-flake-config --command \
            ./cpp/obs/build.sh --target "$TARGET" --libmoq-release "$VERSION" --output dist

      - name: Build and package (macOS / Windows, native)
        if: '!matrix.use_nix'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.parse.outputs.version }}
        run: |
          ./cpp/obs/build.sh --target "$TARGET" --libmoq-release "$VERSION" --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: obs-moq-${{ matrix.target }}
          path: dist/*

  obs-release:
    name: OBS plugin release
    needs: obs-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version libmoq

      # Only the obs-moq archives: the libmoq-* artifacts from the build job
      # belong to the libmoq release, not this one.
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: obs-moq-*
          merge-multiple: true

      # Cut a parallel obs-moq-v<version> release at this commit (gh creates
      # the tag). Notes auto-generate against the previous obs-moq release.
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: "obs-moq-v${{ steps.parse.outputs.version }}"
          RELEASE_TITLE: "obs-moq v${{ steps.parse.outputs.version }}"
        run: .github/scripts/release.sh create artifacts
