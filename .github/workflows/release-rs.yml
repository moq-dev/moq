name: Release RS

permissions:
  pull-requests: write
  contents: write

# Only one release job can run at a time.
concurrency:
  group: release-rs
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Plz

    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'moq-dev' }}

    steps:
      # Generating a GitHub token, so that PRs and tags created by
      # the release-plz-action can trigger actions workflows.
      - name: Generate GitHub token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}

      # Install Nix for system dependencies (e.g. ffmpeg)
      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main

      # Catch packaging issues across every workspace crate before
      # release-plz attempts the real publish. PR CI skips this step to
      # keep PRs fast; this is the gate that catches it on main.
      - name: Verify packaging
        run: nix develop --command cargo publish --dry-run --workspace

      - name: Release
        run: nix develop --command just rs release
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
