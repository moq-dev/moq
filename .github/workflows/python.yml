name: python

on:
  push:
    tags:
      - "moq-ffi-v*"

permissions:
  contents: read

concurrency:
  group: moq-ffi-python-release
  cancel-in-progress: true

jobs:
  parse-version:
    name: Parse version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Parse version from tag
        id: parse
        run: .github/scripts/release.sh parse-version moq-ffi

  build:
    name: Build wheels (${{ matrix.target }})
    needs: [parse-version]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            # Use manylinux_2_28 for aarch64-linux to get a newer GCC.
            # manylinux2014 ships GCC 4.8.5 which can't compile aws-lc-sys.
            manylinux: 2_28
            # The cross image sets TARGET_CC/CXX which leaks into host builds.
            before-script-linux: "unset TARGET_CC TARGET_CXX"
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ needs.parse-version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" rs/moq-ffi/Cargo.toml
          rm -f rs/moq-ffi/Cargo.toml.bak

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m rs/moq-ffi/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          before-script-linux: ${{ matrix.before-script-linux || '' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    # Skipped until PUBLISH_PYTHON=true is set in repo variables.
    if: vars.PUBLISH_PYTHON == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/moq-ffi
    permissions:
      id-token: write

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
