name: moq-gst

on:
  push:
    tags:
      - "moq-gst-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build tarball (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@00199f951aeb9404028a6e4b95ad42546f73296a # main
      - uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # main

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version moq-gst

      - name: Build and package (tarball)
        shell: bash
        run: |
          ./rs/moq-gst/build.sh \
            --target ${{ matrix.target }} \
            --version ${{ steps.parse.outputs.version }} \
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: moq-gst-${{ matrix.target }}
          path: dist/*

  package-deb:
    name: Package .deb (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
            deb-arch: amd64
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-22.04-arm
            deb-arch: arm64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install GStreamer dev headers
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - name: Install nfpm
        shell: bash
        run: .github/scripts/install-nfpm.sh

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version moq-gst

      - name: Build and package
        shell: bash
        run: |
          ./rs/moq-gst/package.sh \
            --packager deb \
            --version ${{ steps.parse.outputs.version }} \
            --arch ${{ matrix.deb-arch }} \
            --target ${{ matrix.target }} \
            --output dist

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: moq-gst-deb-${{ matrix.deb-arch }}
          path: dist/*.deb

  package-rpm:
    name: Package .rpm (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
            rpm-arch: x86_64
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-22.04-arm
            rpm-arch: aarch64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install nfpm
        shell: bash
        run: .github/scripts/install-nfpm.sh

      - name: Parse version
        id: parse
        shell: bash
        run: .github/scripts/release.sh parse-version moq-gst

      - name: Build inside AlmaLinux 9 (glibc 2.34)
        shell: bash
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          RPM_ARCH: ${{ matrix.rpm-arch }}
          TARGET: ${{ matrix.target }}
        run: |
          docker run --rm \
            -v "$PWD":/work -w /work \
            -e VERSION -e RPM_ARCH -e TARGET \
            almalinux:9 bash -c '
              set -euo pipefail
              dnf install -y --quiet \
                gcc make pkgconf-pkg-config curl tar gzip which \
                gstreamer1-devel gstreamer1-plugins-base-devel
              curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain stable --profile minimal
              source $HOME/.cargo/env
              cargo build --release --target "$TARGET" -p moq-gst
            '

      - name: Package via nfpm
        shell: bash
        env:
          VERSION: ${{ steps.parse.outputs.version }}
          ARCH: ${{ matrix.rpm-arch }}
          PKG_NAME: gstreamer1-moq
          PLUGIN_PATH: target/${{ matrix.target }}/release/libgstmoq.so
          PLUGIN_DIR: /usr/lib64/gstreamer-1.0
        run: |
          mkdir -p dist
          nfpm pkg --packager rpm --config packaging/moq-gst/nfpm.yaml --target dist/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: moq-gst-rpm-${{ matrix.rpm-arch }}
          path: dist/*.rpm

  release:
    name: Release
    needs: [build, package-deb, package-rpm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Parse version
        id: parse
        run: .github/scripts/release.sh parse-version moq-gst

      - name: Find previous tag
        id: prev_tag
        run: .github/scripts/release.sh prev-tag moq-gst

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_TITLE: "moq-gst v${{ steps.parse.outputs.version }}"
          RELEASE_PREV_TAG: ${{ steps.prev_tag.outputs.tag }}
        run: .github/scripts/release.sh create artifacts

      - name: Trigger apt/rpm repo publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: .github/scripts/trigger-repo-publish.sh
